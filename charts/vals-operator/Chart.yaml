---
apiVersion: v2
name: vals-operator
description: >
  Kubernetes operator that syncs secrets from external secret stores (HashiCorp Vault, AWS Secrets Manager,
  GCP Secret Manager, Azure Key Vault, and other backends supported by
  [vals](https://github.com/helmfile/vals)) into native Kubernetes Secrets. Also supports dynamic database
  credentials via the [HashiCorp Vault Database Secrets Engine](https://developer.hashicorp.com/vault/docs/secrets/databases),
  cross-namespace secret replication with configurable restrictions, and automatic rollout of workloads when
  referenced secrets change.
icon: https://digitalis.io/wp-content/uploads/2020/06/cropped-Digitalis-512x512-Blue_Digitalis-512x512-Blue-32x32.png
kubeVersion: ">= 1.19.0-0"
type: application

