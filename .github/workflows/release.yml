---
name: Publish Docker image

on:
  release:
    types: [published]

jobs:
  release:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      # - name: Setup mirror
      #   uses: self-actuated/hub-mirror@master

      - name: Get TAG
        id: get_tag
        run: echo TAG=${GITHUB_REF##*/} >> $GITHUB_ENV

      - name: Get Repo Owner
        id: get_repo_owner
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" > $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: "Get docker info"
        run: |
          echo "Actor: ${{ github.actor }}"

      - name: "Log into GitHub Container Registry"
        if: "github.event_name != 'pull_request'"
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          platforms: linux/amd64,linux/arm/v6,linux/arm64
          build-args: |
            VERSION=${{ env.TAG }}
            GitCommit=${{ github.sha }}
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/vals-operator:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER }}/vals-operator:${{ env.TAG }}
            ghcr.io/${{ env.REPO_OWNER }}/vals-operator:latest
          labels: |
            LABEL org.opencontainers.image.source="https://github.com/${{ env.REPO_OWNER }}/vals-operator"

  # Publish the Helm chart as an OCI artifact to ghcr.io.
  # The traditional Helm repo at https://digitalis-io.github.io/helm-charts
  # remains the primary distribution channel and is managed in a separate repo.
  # TODO: Once OCI adoption is widespread, consider deprecating the traditional
  #       Helm repo in favour of ghcr.io OCI distribution only.
  helm-oci:
    name: Publish Helm chart to ghcr.io (OCI)
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0

      - name: Get TAG
        id: get_tag
        run: echo "TAG=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Derive chart version from release tag
        run: |
          # Strip leading 'v' for the chart version (e.g. v0.9.0 -> 0.9.0)
          CHART_VERSION="${TAG#v}"
          echo "CHART_VERSION=${CHART_VERSION}" >> $GITHUB_ENV

          # Substitute version and appVersion in Chart.yaml (build-time only, not committed)
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" charts/vals-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: ${TAG}/" charts/vals-operator/Chart.yaml

          echo "Chart.yaml after substitution:"
          grep -E '^(version|appVersion):' charts/vals-operator/Chart.yaml

      - name: Log into ghcr.io Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package Helm chart
        run: helm package charts/vals-operator --destination /tmp/helm-packages

      - name: Push Helm chart to OCI registry
        run: helm push "/tmp/helm-packages/vals-operator-${CHART_VERSION}.tgz" oci://ghcr.io/digitalis-io/helm-charts
